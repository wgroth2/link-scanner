<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap Link Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .progress { height: 25px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Sitemap Link Scanner</h3>
                </div>
                <div class="card-body">
                    <form id="scanForm">
                        <div class="mb-3">
                            <label for="sitemapUrl" class="form-label">Sitemap URL</label>
                            <input type="url" class="form-control" id="sitemapUrl" placeholder="https://example.com/sitemap.xml" required>
                        </div>
                        <div class="mb-3">
                            <label for="searchString" class="form-label">Search String</label>
                            <input type="text" class="form-control" id="searchString" placeholder="e.g., contact" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="searchAll">
                            <label class="form-check-label" for="searchAll">Search entire HTML content (slower)</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="scanBtn">Start Scan</button>
                    </form>

                    <div id="progressSection" class="mt-4 d-none">
                        <h5 id="statusText">Initializing...</h5>
                        <div class="progress">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
                        </div>
                    </div>

                    <div id="errorAlert" class="alert alert-danger mt-3 d-none"></div>
                </div>
            </div>

            <div id="resultsSection" class="card shadow mt-4 d-none">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Results</h4>
                </div>
                <div class="card-body">
                    <p><strong>Total Scanned:</strong> <span id="totalScanned">0</span> | <strong>Matches Found:</strong> <span id="matchesFound">0</span></p>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>URL</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('scanForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Reset UI
        document.getElementById('progressSection').classList.remove('d-none');
        document.getElementById('resultsSection').classList.add('d-none');
        document.getElementById('errorAlert').classList.add('d-none');
        document.getElementById('scanBtn').disabled = true;
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressBar').innerText = '0%';
        document.getElementById('resultsTableBody').innerHTML = '';

        const sitemapUrl = document.getElementById('sitemapUrl').value;
        const searchString = document.getElementById('searchString').value;
        const searchAll = document.getElementById('searchAll').checked;

        try {
            // Start Scan
            const response = await fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sitemap_url: sitemapUrl, search_string: searchString, search_all: searchAll })
            });
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);
            
            const taskId = data.task_id;
            pollStatus(taskId);

        } catch (error) {
            showError(error.message);
        }
    });

    async function pollStatus(taskId) {
        const response = await fetch(`/api/status/${taskId}`);
        const data = await response.json();

        document.getElementById('statusText').innerText = data.status;
        document.getElementById('progressBar').style.width = data.percent + '%';
        document.getElementById('progressBar').innerText = data.percent + '%';

        if (data.state === 'SUCCESS') {
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('resultsSection').classList.remove('d-none');
            document.getElementById('totalScanned').innerText = data.result.total_scanned;
            document.getElementById('matchesFound').innerText = data.result.matches_found;

            const tbody = document.getElementById('resultsTableBody');
            data.result.urls.forEach((url, index) => {
                tbody.innerHTML += `<tr><td>${index + 1}</td><td><a href="${url}" target="_blank">${url}</a></td></tr>`;
            });
        } else if (data.state === 'FAILURE' || data.state === 'REVOKED') {
            showError(data.error || 'An unknown error occurred.');
        } else {
            setTimeout(() => pollStatus(taskId), 2000);
        }
    }

    function showError(msg) {
        const alert = document.getElementById('errorAlert');
        alert.innerText = msg;
        alert.classList.remove('d-none');
        document.getElementById('scanBtn').disabled = false;
    }
</script>
</body>
</html>
