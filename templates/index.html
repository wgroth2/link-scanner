<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
        HEAD SECTION:
        Contains meta tags to prevent caching so users always see fresh content, and imports Bootstrap CSS.
    -->
    <title>Website String Search</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- 
    MAIN CONTAINER:
    Holds the application title, the input form, progress bar, and results table.
-->
<div class="container py-5">
    <h1 class="text-center mb-4">Website String Search</h1>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Sitemap Link Scanner</h3>
                </div>
                <div class="card-body">
                    <!-- 
                        INPUT FORM:
                        Collects the Sitemap URL and the string to search for.
                    -->
                    <form id="scanForm">
                        <div class="mb-3">
                            <label for="sitemapUrl" class="form-label">Sitemap URL</label>
                            <input type="url" class="form-control" id="sitemapUrl" value="https://healymarketinggroup.com/sitemap.xml" placeholder="https://example.com/sitemap.xml" required>
                        </div>
                        <div class="mb-3">
                            <label for="searchString" class="form-label">Search String
                                <i class="bi bi-info-circle text-secondary ms-1" data-bs-toggle="tooltip" data-bs-placement="right" title="String is case sensitive, and regular expressions can be used."></i>
                            </label>
                            <input type="text" class="form-control" id="searchString" value="Microsoft" placeholder="e.g., contact" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="searchAll">
                            <label class="form-check-label" for="searchAll">Search entire HTML content (slower)</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="scanBtn">Start Scan</button>
                    </form>

                    <!-- 
                        PROGRESS SECTION:
                        Hidden by default (d-none). Displays the status text and progress bar during a scan.
                    -->
                    <div id="progressSection" class="mt-4 d-none">
                        <h5 id="statusText">Initializing...</h5>
                        <div class="progress">
                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
                        </div>
                    </div>

                    <div id="errorAlert" class="alert alert-danger mt-3 d-none"></div>
                </div>
            </div>

            <!-- 
                RESULTS SECTION:
                Hidden by default. Displays the count of matches and a table of URLs where the string was found.
            -->
            <div id="resultsSection" class="card shadow mt-4 d-none">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Results</h4>
                </div>
                <div class="card-body">
                    <p><strong>Total Scanned:</strong> <span id="totalScanned">0</span> | <strong>Matches Found:</strong> <span id="matchesFound">0</span></p>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>URL</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTableBody">
                            </tbody>
                        </table>
                    </div>
                    <p class="text-muted small mt-3 mb-0">Scan completed in <span id="elapsedTime">0</span></p>
                    <div id="timeoutSection" class="d-none mt-3">
                        <div class="alert alert-warning mb-2">
                            <strong>Pages that timed out (<span id="timeoutCount">0</span>):</strong> These pages did not respond in time and were not scanned.
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm table-bordered">
                                <tbody id="timeoutTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 
    FOOTER SECTION:
    Displays copyright information and links.
-->
<footer class="py-4 text-center text-muted">
    <div class="container">
        <p>&copy; 2026 <a href="https://billroth.net" target="_blank">Bill Roth</a></p>
        <p class="small mb-0">Last Updated: {{ last_updated }}</p>
    </div>
</footer>

<script>
    /*
        FORM SUBMISSION HANDLER:
        1. Intercepts the form submit event.
        2. Resets the UI (clears previous results, shows progress bar).
        3. Sends a POST request to the Flask backend to start the Celery task.
        4. Initiates the polling loop with the returned Task ID.
    */
    document.getElementById('scanForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Reset UI
        document.getElementById('progressSection').classList.remove('d-none');
        document.getElementById('resultsSection').classList.add('d-none');
        document.getElementById('errorAlert').classList.add('d-none');
        document.getElementById('scanBtn').disabled = true;
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressBar').innerText = '0%';
        document.getElementById('resultsTableBody').innerHTML = '';
        document.getElementById('timeoutSection').classList.add('d-none');
        document.getElementById('timeoutTableBody').innerHTML = '';
        window._scanStartTime = Date.now();

        const sitemapUrl = document.getElementById('sitemapUrl').value;
        const searchString = document.getElementById('searchString').value;
        const searchAll = document.getElementById('searchAll').checked;

        try {
            // Start Scan
            const response = await fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sitemap_url: sitemapUrl, search_string: searchString, search_all: searchAll })
            });
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);
            
            const taskId = data.task_id;
            localStorage.setItem('activeTaskId', taskId);
            localStorage.setItem('scanStartTime', window._scanStartTime);
            pollStatus(taskId);

        } catch (error) {
            showError(error.message);
        }
    });

    /*
        POLLING FUNCTION:
        Recursively checks the task status every 2 seconds.
        Updates the progress bar and renders the results table when the task succeeds.
    */
    async function pollStatus(taskId) {
        const response = await fetch(`/api/status/${taskId}`);
        const data = await response.json();

        document.getElementById('statusText').innerText = data.status;
        document.getElementById('progressBar').style.width = data.percent + '%';
        document.getElementById('progressBar').innerText = data.percent + '%';

        if (data.state === 'SUCCESS') {
            localStorage.removeItem('activeTaskId');
            localStorage.removeItem('scanStartTime');
            const elapsed = ((Date.now() - window._scanStartTime) / 1000).toFixed(1);
            document.getElementById('elapsedTime').innerText = elapsed + 's';
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('resultsSection').classList.remove('d-none');
            document.getElementById('totalScanned').innerText = data.result.total_scanned;
            document.getElementById('matchesFound').innerText = data.result.matches_found;

            const tbody = document.getElementById('resultsTableBody');
            data.result.urls.forEach((url, index) => {
                tbody.innerHTML += `<tr><td>${index + 1}</td><td><a href="${url}" target="_blank">${url}</a></td></tr>`;
            });

            const timedOut = data.result.timed_out || [];
            if (timedOut.length > 0) {
                document.getElementById('timeoutSection').classList.remove('d-none');
                document.getElementById('timeoutCount').innerText = timedOut.length;
                const timeoutTbody = document.getElementById('timeoutTableBody');
                timedOut.forEach(url => {
                    timeoutTbody.innerHTML += `<tr><td><a href="${url}" target="_blank">${url}</a></td></tr>`;
                });
            }
        } else if (data.state === 'FAILURE' || data.state === 'REVOKED') {
            localStorage.removeItem('activeTaskId');
            localStorage.removeItem('scanStartTime');
            showError(data.error || 'An unknown error occurred.');
        } else {
            setTimeout(() => pollStatus(taskId), 5000);
        }
    }

    /*
        PAGE LOAD HANDLER:
        On reload, check localStorage for an in-progress task and resume polling if found.
    */
    window.addEventListener('DOMContentLoaded', function() {
        const savedTaskId = localStorage.getItem('activeTaskId');
        if (savedTaskId) {
            const savedStartTime = localStorage.getItem('scanStartTime');
            window._scanStartTime = savedStartTime ? parseInt(savedStartTime) : Date.now();
            document.getElementById('progressSection').classList.remove('d-none');
            document.getElementById('scanBtn').disabled = true;
            document.getElementById('statusText').innerText = 'Reconnecting to scan...';
            pollStatus(savedTaskId);
        }
    });

    /*
        ERROR HANDLER:
        Displays error messages in the alert box and re-enables the submit button.
    */
    function showError(msg) {
        const alert = document.getElementById('errorAlert');
        alert.innerText = msg;
        alert.classList.remove('d-none');
        document.getElementById('scanBtn').disabled = false;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
</script>
</body>
</html>
